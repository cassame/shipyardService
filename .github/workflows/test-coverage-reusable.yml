name: Test Coverage Reusable

on:
  workflow_call:
    inputs:
      modules:
        required: true
        type: string
      go-version:
        required: true
        type: string
      gist-id:
        required: true
        type: string
    secrets:
      GIST_SECRET:
        required: true

jobs:
  coverage:
    name: Run tests and update badge
    runs-on: ubuntu-latest

    env:
      COVERAGE_DIR: coverage
      COVERAGE_FILE: total.out

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4.2.2

      - name: 🧰 Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: ${{ inputs.go-version }}

      - name: 📌 Install Task
        uses: arduino/setup-task@v2.0.0

      - name: 🧪 Run tests with coverage
        env:
          MODULES: ${{ inputs.modules }}
        run: task test-coverage

      - name: 📊 Extract coverage percent
        run: |
          FILE_PATH="${{ env.COVERAGE_DIR }}/${{ env.COVERAGE_FILE }}"
          
          # Считаем покрытие вручную из профиля:
          # Каждая строка в .out: "file:start,end stmts count"
          # stmts = кол-во statements, count = сколько раз выполнено (0 = не покрыто)
          TOTAL=$(awk '
            /^mode:/ { next }
            {
              stmts += $2        # суммируем все statements
              if ($3 > 0) covered += $2   # если count > 0 — покрыто
            }
            END {
              if (stmts == 0) { print "0%" }
              else { printf "%.1f%%\n", covered/stmts*100 }
            }
          ' "$FILE_PATH")
          
          echo "✅ Результирующее значение: '$TOTAL'"
          echo "TOTAL_COVERAGE=$TOTAL" >> $GITHUB_ENV
          echo "GIST_ID=${{ inputs.gist-id }}" >> $GITHUB_ENV

      - name: 🏷️ Update Gist Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ env.GIST_ID }}
          filename: coverage.json
          label: Coverage
          message: ${{ env.TOTAL_COVERAGE }}
          color: green
