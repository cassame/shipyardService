name: Test Coverage Reusable

on:
  workflow_call:
    inputs:
      modules:
        required: true
        type: string
      go-version:
        required: true
        type: string
      gist-id:
        required: true
        type: string
    secrets:
      GIST_SECRET:
        required: true

jobs:
  coverage:
    name: Run tests and update badge
    runs-on: ubuntu-latest

    env:
      COVERAGE_DIR: coverage
      COVERAGE_FILE: total.out

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4.2.2

      - name: 🧰 Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: ${{ inputs.go-version }}

      - name: 📌 Install Task
        uses: arduino/setup-task@v2.0.0

      - name: 🧪 Run tests with coverage
        env:
          MODULES: ${{ inputs.modules }}
        run: task test-coverage

      - name: 📊 Extract coverage percent
        run: |
          FILE_PATH="${{ env.COVERAGE_DIR }}/${{ env.COVERAGE_FILE }}"
          
          # 1. Запускаем анализ и ищем только строку с 'total:'
          # 2. Очищаем её от мусора и берем последнее слово
          # 3. Дополнительно через sed оставляем только цифры, точки и знак %
          TOTAL=$(go tool cover -func="$FILE_PATH" | grep "^total:" | awk '{print $NF}' | sed 's/[^0-9.%]//g')
          
          # Проверка: если после всех чисток пусто — ставим 0%
          if [ -z "$TOTAL" ]; then
            echo "⚠️  Парсинг не удался, ставим 0%"
            TOTAL="0%"
          fi
          
          echo "✅ Результирующее значение для бейджа: '$TOTAL'"
          
          echo "TOTAL_COVERAGE=$TOTAL" >> $GITHUB_ENV
          echo "GIST_ID=${{ inputs.gist-id }}" >> $GITHUB_ENV

      - name: 🏷️ Update Gist Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ env.GIST_ID }}
          filename: coverage.json
          label: Coverage
          message: ${{ env.TOTAL_COVERAGE }}
          color: green
