syntax = "proto3";

import "google/protobuf/timestamp.proto";

package inventory.v1;

option go_package = "shared/pkg/proto/inventory/v1;inventoryv1";

message Dimensions {
  double length = 1;
  double width = 2;
  double height = 3;
  double weight = 4;
}

message Manufacturer {
  string name = 1;
  string country = 2;
  string website = 3;
}

enum Category {
  CATEGORY_UNKNOWN_UNSPECIFIED = 0;
  CATEGORY_ENGINE = 1;
  CATEGORY_FUEL = 2;
  CATEGORY_PORTHOLE = 3;
  CATEGORY_WING = 4;
}
message Value {
    oneof kind {
      string string_value = 1;
      int64 int64_value = 2;
      double double_value = 3;
      bool bool_value = 4;
    }
}

message Part {
  string uuid = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int64 stock_quantity = 5;
  Dimensions dimensions = 6;
  Manufacturer manufacturer = 7;
  Category category = 8;
  repeated string tags = 9;
  map<string, Value> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp  updated_at = 12;
}

message PartsFilter {
  repeated string uuids = 1;
  repeated string names = 2;
  repeated Category categories = 3;
  repeated string manufacturer_countries = 4;
  repeated string tags = 5;
}

message GetPartRequest {
  string uuid = 1;
}
message GetPartResponse {
  Part part = 1;
}

message ListPartsRequest {
    PartsFilter filter = 1;
}
message ListPartsResponse {
    repeated Part parts = 1;
}

message UpdateStockRequest {
  string uuid = 1;
  int64 delta = 2;
}
message UpdateStockResponse {}



service InventoryService {
  rpc GetPart(GetPartRequest) returns (GetPartResponse);
  rpc ListParts(ListPartsRequest) returns (ListPartsResponse);
  rpc UpdateStock(UpdateStockRequest) returns (UpdateStockResponse);
}